name: Argo — crawl giornaliero

on:
  schedule:
    - cron: "0 5 * * *"   # 07:00 IT estate / 06:00 inverno
  workflow_dispatch:
    inputs:
      discovery:
        description: "Esegui anche la discovery (lenta, di solito mensile)"
        type: boolean
        default: false
      reset:
        description: "Deploy pulito: azzera findings + first_crawled (una tantum dopo un cambio di schema/fingerprint)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: argo-crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa dipendenze (pypdf per la scadenza)
        run: pip install -r requirements.txt

      # Lo stato (argo.db + CSV) NON e' versionato: persiste tra run via cache.
      # Degradazione accettabile se la cache si svuota (si rifa' la discovery).
      - name: Ripristina cache stato (DB + CSV anagrafe)
        uses: actions/cache@v4
        with:
          path: data
          key: argo-data-${{ github.run_id }}
          restore-keys: |
            argo-data-

      # Discovery: solo su richiesta esplicita, o se manca il DB (primo giro).
      - name: Discovery (se richiesta o primo giro)
        run: |
          if [ "${{ inputs.discovery }}" = "true" ] || [ ! -f data/argo.db ]; then
            echo "Eseguo la discovery..."
            python3 run_discovery.py --config config.json
          else
            echo "Skip discovery (DB gia' presente)."
          fi

      - name: Crawl incrementale
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          RESET=""
          if [ "${{ inputs.reset }}" = "true" ]; then RESET="--reset"; fi
          python3 run_crawl.py --config config.json $RESET

      - name: Commit risultati (snapshot bandi + report discovery)
        run: |
          git config user.name "argo-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/snapshots/ data/discovery_report.json data/schools_map.csv
          git commit -m "Risultati $(date +%F)" || { echo "nessuna modifica"; exit 0; }
          # Lo snapshot odierno puo' collidere con uno gia' su main (stesso giorno):
          # rebase -X theirs tiene la NOSTRA versione (i commit riapplicati). Retry
          # per gestire una corsa con un altro push concorrente.
          for i in 1 2 3; do
            git fetch origin main
            if git rebase -X theirs origin/main && git push; then exit 0; fi
            git rebase --abort 2>/dev/null || true
            echo "push fallito, ritento ($i)..."; sleep 5
          done
          echo "push fallito dopo 3 tentativi"; exit 1
